<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>価格見積もり管理 | 薬剤部</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #222536;
    --border: #2e3248;
    --accent: #4f8ef7;
    --accent2: #38d9a9;
    --danger: #f76f6f;
    --warn: #f7b84f;
    --text: #e8eaf0;
    --text2: #8b90a8;
    --green: #38d9a9;
    --red: #f76f6f;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Hiragino Sans', 'Yu Gothic UI', sans-serif; font-size: 14px; min-height: 100vh; }

  /* Header */
  .header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 24px; display: flex; align-items: center; gap: 16px; height: 52px; }
  .header-title { font-size: 15px; font-weight: 700; color: var(--text); letter-spacing: .03em; }
  .header-sub { font-size: 12px; color: var(--text2); }

  /* Tabs */
  .tabs { display: flex; gap: 2px; background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 24px; }
  .tab { padding: 12px 20px; cursor: pointer; font-size: 13px; color: var(--text2); border-bottom: 2px solid transparent; transition: all .15s; white-space: nowrap; }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  /* Pages */
  .page { display: none; padding: 24px; max-width: 1100px; margin: 0 auto; }
  .page.active { display: block; }

  /* Section */
  .section { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 20px; margin-bottom: 16px; }
  .section-title { font-size: 13px; font-weight: 700; color: var(--text2); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 16px; }

  /* Buttons */
  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; border-radius: 6px; border: none; cursor: pointer; font-size: 13px; font-weight: 600; transition: all .15s; white-space: nowrap; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: #3a7ef0; }
  .btn-success { background: var(--accent2); color: #0f1117; }
  .btn-success:hover { background: #2cc49a; }
  .btn-danger { background: var(--danger); color: #fff; }
  .btn-ghost { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }
  .btn:disabled { opacity: .4; cursor: not-allowed; }

  /* Form */
  .form-row { display: flex; gap: 12px; align-items: flex-end; flex-wrap: wrap; margin-bottom: 12px; }
  .form-group { display: flex; flex-direction: column; gap: 6px; }
  .form-group label { font-size: 12px; color: var(--text2); }
  input[type=text], input[type=date], input[type=number], select, textarea {
    background: var(--bg); border: 1px solid var(--border); border-radius: 6px;
    color: var(--text); padding: 8px 12px; font-size: 13px; outline: none;
    transition: border-color .15s;
  }
  input:focus, select:focus, textarea:focus { border-color: var(--accent); }
  input[type=file] { display: none; }

  /* Upload area */
  .upload-area { border: 2px dashed var(--border); border-radius: 8px; padding: 32px; text-align: center; cursor: pointer; transition: all .15s; }
  .upload-area:hover, .upload-area.dragover { border-color: var(--accent); background: rgba(79,142,247,.05); }
  .upload-area .upload-icon { font-size: 32px; margin-bottom: 8px; }
  .upload-area .upload-text { color: var(--text2); font-size: 13px; }
  .upload-area .upload-hint { color: var(--text2); font-size: 11px; margin-top: 4px; }

  /* Table */
  .table-wrap { overflow-x: auto; border-radius: 6px; border: 1px solid var(--border); }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { background: var(--surface2); color: var(--text2); font-size: 11px; text-transform: uppercase; letter-spacing: .06em; padding: 10px 12px; text-align: left; border-bottom: 1px solid var(--border); white-space: nowrap; }
  td { padding: 9px 12px; border-bottom: 1px solid var(--border); vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(255,255,255,.02); }

  /* Badge */
  .badge { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; }
  .badge-blue { background: rgba(79,142,247,.15); color: var(--accent); }
  .badge-green { background: rgba(56,217,169,.15); color: var(--green); }
  .badge-red { background: rgba(247,111,111,.15); color: var(--red); }
  .badge-gray { background: var(--surface2); color: var(--text2); }

  /* Alert */
  .alert { padding: 12px 16px; border-radius: 6px; font-size: 13px; margin-bottom: 12px; }
  .alert-info { background: rgba(79,142,247,.1); border: 1px solid rgba(79,142,247,.3); color: var(--accent); }
  .alert-success { background: rgba(56,217,169,.1); border: 1px solid rgba(56,217,169,.3); color: var(--green); }
  .alert-error { background: rgba(247,111,111,.1); border: 1px solid rgba(247,111,111,.3); color: var(--red); }

  /* Progress */
  .progress-bar { height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; margin: 8px 0; }
  .progress-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width .3s; }

  /* URL box */
  .url-box { background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 10px 12px; font-size: 12px; font-family: monospace; color: var(--text2); display: flex; align-items: center; gap: 8px; }
  .url-box span { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .url-copy { cursor: pointer; color: var(--accent); font-size: 11px; white-space: nowrap; padding: 4px 8px; border-radius: 4px; border: 1px solid var(--accent); transition: all .15s; }
  .url-copy:hover { background: var(--accent); color: #fff; }

  /* Wholesaler grid */
  .wholesaler-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; }
  .wholesaler-card { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 14px; }
  .wholesaler-name { font-weight: 700; margin-bottom: 8px; font-size: 13px; }

  /* Compare table - price highlight */
  .price-best { color: var(--green); font-weight: 700; }
  .price-bad { color: var(--red); }
  .adopted-row td { background: rgba(56,217,169,.04); }

  /* Modal */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.6); z-index: 1000; align-items: center; justify-content: center; }
  .modal-overlay.open { display: flex; }
  #item-modal { z-index: 2000; }
  .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 24px; min-width: 480px; max-width: 90vw; max-height: 85vh; overflow-y: auto; }
  .modal-title { font-size: 15px; font-weight: 700; margin-bottom: 20px; }
  .modal-footer { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }

  /* Stats row */
  .stats-row { display: flex; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }
  .stat-card { background: var(--surface2); border-radius: 6px; padding: 12px 16px; flex: 1; min-width: 120px; }
  .stat-label { font-size: 11px; color: var(--text2); margin-bottom: 4px; }
  .stat-value { font-size: 20px; font-weight: 700; }

  /* Spinner */
  .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(255,255,255,.2); border-top-color: #fff; border-radius: 50%; animation: spin .6s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Checkbox */
  input[type=checkbox] { width: 16px; height: 16px; cursor: pointer; accent-color: var(--accent2); }

  .text-muted { color: var(--text2); }
  .text-sm { font-size: 12px; }
  .mt-8 { margin-top: 8px; }
  .flex { display: flex; }
  .gap-8 { gap: 8px; }
  .items-center { align-items: center; }
  .justify-between { justify-content: space-between; }
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="header-title">💊 価格見積もり管理システム</div>
  </div>
  <div style="margin-left:auto; font-size:12px; color:var(--text2)" id="db-status">接続中...</div>
</div>

<div class="tabs">

  <div class="tab" onclick="switchTab('session')">② セッション管理</div>
  <div class="tab" onclick="switchTab('compare')">③ 比較・採用</div>

<!-- ==================== PAGE A: マスタ取り込み ==================== -->
<div class="page active" id="page-master">
  <div class="section">
    <div class="section-title">orderepi CSVアップロード</div>
    <div id="upload-area" class="upload-area" onclick="document.getElementById('csv-file').click()"

    <div class="table-wrap" style="max-height:300px;overflow-y:auto">
      <table>

        </thead>
        <tbody id="master-list-body"></tbody>
      </table>

</div>

<!-- ==================== PAGE B: セッション管理 ==================== -->

<!-- ==================== PAGE C: 比較・採用 ==================== -->
<div class="page" id="page-compare">

      <button class="btn btn-ghost" onclick="closeItemModal()">キャンセル</button>

<!-- ==================== Modal: セッション詳細・URL発行 ==================== -->
<div class="modal-overlay" id="session-detail-modal">
  <div class="modal" style="min-width:680px">
    <div class="modal-title" id="session-detail-title">セッション詳細</div>
    <div id="session-detail-body"></div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeSessionModal()">閉じる</button>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://ipudfidnptdshywvddcf.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlwdWRmaWRucHRkc2h5d3ZkZGNmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc2NjA5ODksImV4cCI6MjA5MzIzNjk4OX0.yzN4u9KAWff06x6MQwf16s88Rk7vfmEyP69GQ1HIqbQ';
const BASE_URL = 'https://pharmacy-quote.vercel.app';
const WHOLESALERS = ['アトル', 'スズケン', 'ダイコー', '東邦', '琉薬'];

const sb = (path, opts = {}) => fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
  headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}`,
    'Content-Type': 'application/json', 'Prefer': opts.prefer || '', ...opts.headers },
  method: opts.method || 'GET', body: opts.body ? JSON.stringify(opts.body) : undefined
}).then(r => r.ok ? r.json() : r.json().then(e => { throw e; }));

// ---- Init ----
async function init() {
  try {
    await sb('master_medicines?select=yj_code&limit=1');
    document.getElementById('db-status').textContent = '✅ DB接続OK';
    document.getElementById('db-status').style.color = 'var(--green)';
  } catch(e) {
    document.getElementById('db-status').textContent = '❌ DB接続エラー';
    document.getElementById('db-status').style.color = 'var(--red)';
  }
  loadMasterList();
  loadSessions();
}

// ---- Tabs ----
function switchTab(name) {
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', ['master','session','compare'][i] === name));
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  if (name === 'session') loadSessions();
  if (name === 'compare') loadCompareSessions();
}

// ================================================================
// PAGE A: マスタ取り込み
// ================================================================
let parsedRows = [];

function handleDrop(e) {
  e.preventDefault();
  document.getElementById('upload-area').classList.remove('dragover');
  const file = e.dataTransfer.files[0];
  if (file) parseCSV(file);
}
function handleFileSelect(e) { if (e.target.files[0]) parseCSV(e.target.files[0]); }

function parseCSV(file) {
  const reader = new FileReader();
  reader.onload = function(e) {
    // Shift-JIS decode
    const buf = e.target.result;
    const decoded = new TextDecoder('shift-jis').decode(new Uint8Array(buf));
    const lines = decoded.split('\n').filter(l => l.trim());
    const headers = parseCSVLine(lines[0]);

    // 列インデックス取得
    const idx = {
      yj: headers.findIndex(h => h.includes('ＹＪ') || h === 'YJコード'),
      name: headers.findIndex(h => h === '品名'),
      spec: headers.findIndex(h => h.includes('規格')),
      maker: headers.findIndex(h => h === 'メーカー'),
      drug_price: headers.findIndex(h => h === '薬価'),
      pkg_price: headers.findIndex(h => h === '包装薬価'),
      pkg_qty: headers.findIndex(h => h.includes('係数')),
      gs1_pkg: headers.findIndex(h => h.includes('ＧＳ１') && h.includes('包装')),
      gs1_disp: headers.findIndex(h => h.includes('ＧＳ１') && h.includes('調剤')),
      jan: headers.findIndex(h => h === 'ＪＡＮコード'),
      dosage: headers.findIndex(h => h === '剤形'),
      poison: headers.findIndex(h => h === '毒劇薬'),
      stop: headers.findIndex(h => h.includes('中止区分')),
    };

    parsedRows = [];
    for (let i = 1; i < lines.length; i++) {
      const cols = parseCSVLine(lines[i]);
      const yj  = (cols[idx.yj]  || '').trim();
      const gs1 = (cols[idx.gs1_pkg] || '').trim();
      // YJコードなし・000000000000・GS1なしは除外（備品・消耗品）
      if (!yj || yj === 'ＹＪコード' || yj === '000000000000' || !gs1) continue;
      parsedRows.push({
        gs1_pkg: gs1,
        yj_code: yj,
        name: cols[idx.name] || '',
        spec: cols[idx.spec] || '',
        maker: cols[idx.maker] || '',
        drug_price: parseFloat(cols[idx.drug_price]) || 0,
        pkg_price: parseFloat(cols[idx.pkg_price]) || 0,
        pkg_qty: parseFloat(cols[idx.pkg_qty]) || 1,
        gs1_dispensing: cols[idx.gs1_disp] || '',
        jan_code: cols[idx.jan] || '',
        dosage_form: cols[idx.dosage] || '',
        poison_flag: cols[idx.poison] || '',
        stop_flag: cols[idx.stop] || '',
      });
    }

    // GS1重複除去（同一GS1は最後の行で上書き）
    const deduped = new Map();
    for (const row of parsedRows) deduped.set(row.gs1_pkg, row);
    parsedRows = Array.from(deduped.values());

    showPreview();
  };
  reader.readAsArrayBuffer(file);
}

function parseCSVLine(line) {
  const result = [];
  let cur = '', inQ = false;
  for (let i = 0; i < line.length; i++) {
    const c = line[i];
    if (c === '"') { inQ = !inQ; continue; }
    if (c === ',' && !inQ) { result.push(cur.trim()); cur = ''; continue; }
    cur += c;
  }
  result.push(cur.trim());
  return result;
}

function showPreview() {
  document.getElementById('preview-section').style.display = 'block';
  document.getElementById('preview-stats').textContent = `${parsedRows.length}件`;
  const body = document.getElementById('preview-body');
  body.innerHTML = parsedRows.slice(0, 50).map(r => `
    <tr>
      <td class="text-sm">${r.yj_code}</td>
      <td>${r.name}</td>
      <td class="text-sm text-muted">${r.spec}</td>
      <td class="text-sm text-muted">${r.maker}</td>
      <td class="text-sm" style="text-align:right">${r.drug_price.toFixed(2)}</td>
      <td class="text-sm" style="text-align:right">${r.pkg_price.toFixed(2)}</td>
      <td class="text-sm" style="text-align:right">${r.pkg_qty}</td>
      <td class="text-sm text-muted">${r.gs1_pkg}</td>
      <td class="text-sm text-muted">${r.jan_code}</td>
    </tr>`).join('');
  if (parsedRows.length > 50) {
    body.innerHTML += `<tr><td colspan="9" style="text-align:center;color:var(--text2);padding:12px">… 他${parsedRows.length - 50}件（プレビューは50件まで表示）</td></tr>`;
  }
}

async function uploadMaster() {
  if (!parsedRows.length) return;
  const btn = document.getElementById('upload-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> 取り込み中...';

  const progArea = document.getElementById('progress-area');
  const progFill = document.getElementById('progress-fill');
  const progText = document.getElementById('progress-text');
  progArea.style.display = 'block';

  const CHUNK = 200;
  let done = 0;
  const errors = [];

  for (let i = 0; i < parsedRows.length; i += CHUNK) {
    const chunk = parsedRows.slice(i, i + CHUNK);
    try {
      await fetch(`${SUPABASE_URL}/rest/v1/master_medicines`, {
        method: 'POST',
        headers: {
          apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}`,
          'Content-Type': 'application/json', 'Prefer': 'return=minimal,resolution=merge-duplicates', 'on-conflict': 'gs1_pkg'
        },
        body: JSON.stringify(chunk)
      });
      done += chunk.length;
      const pct = Math.round(done / parsedRows.length * 100);
      progFill.style.width = pct + '%';
      progText.textContent = `${done} / ${parsedRows.length} 件処理中...`;
    } catch(e) {
      errors.push(e);
    }
  }

  btn.disabled = false;
  btn.innerHTML = 'DBに取り込む';
  progArea.style.display = 'none';

  const alertArea = document.getElementById('alert-area');
  if (errors.length === 0) {
    alertArea.innerHTML = `<div class="alert alert-success">✅ ${parsedRows.length}件のマスタを取り込みました</div>`;
    loadMasterList();
  } else {
    alertArea.innerHTML = `<div class="alert alert-error">⚠ 一部エラーが発生しました（${errors.length}件）</div>`;
  }
  setTimeout(() => { alertArea.innerHTML = ''; }, 4000);
}

function resetUpload() {
  parsedRows = [];
  document.getElementById('preview-section').style.display = 'none';
  document.getElementById('csv-file').value = '';
}

async function loadMasterList() {
  try {
    const data = await sb('master_medicines?select=yj_code,name,spec,maker,drug_price,pkg_price,pkg_qty&order=name&limit=100');
    const statsDiv = document.getElementById('master-stats');
    statsDiv.innerHTML = `
      <div class="stat-card"><div class="stat-label">登録品目数</div><div class="stat-value">${data.length >= 100 ? '100+' : data.length}</div></div>
    `;
    // 全件数を別途取得
    fetch(`${SUPABASE_URL}/rest/v1/master_medicines?select=gs1_pkg`, {
      headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}`, 'Prefer': 'count=exact', 'Range': '0-0' }
    }).then(r => {
      const ct = r.headers.get('Content-Range');
      if (ct) {
        const total = ct.split('/')[1];
        statsDiv.innerHTML = `<div class="stat-card"><div class="stat-label">登録品目数</div><div class="stat-value">${parseInt(total).toLocaleString()}</div></div>`;
      }
    });

    const body = document.getElementById('master-list-body');
    if (!data.length) {
      body.innerHTML = '<tr><td colspan="7" style="text-align:center;color:var(--text2);padding:20px">データなし</td></tr>';
      return;
    }
    body.innerHTML = data.map(r => `
      <tr>
        <td class="text-sm">${r.yj_code}</td>
        <td>${r.name}</td>
        <td class="text-sm text-muted">${r.spec || ''}</td>
        <td class="text-sm text-muted">${r.maker || ''}</td>
        <td class="text-sm" style="text-align:right">${r.drug_price?.toFixed(2) || '-'}</td>
        <td class="text-sm" style="text-align:right">${r.pkg_price?.toFixed(2) || '-'}</td>
        <td class="text-sm" style="text-align:right">${r.pkg_qty || '-'}</td>
      </tr>`).join('');
  } catch(e) {
    console.error(e);
  }
}

// ================================================================
// PAGE B: セッション管理
// ================================================================
let currentSessionId = null;
let allMasterItems = [];

async function createSession() {
  const title = document.getElementById('session-title').value.trim();
  const deadline = document.getElementById('session-deadline').value;
  if (!title) { alert('タイトルを入力してください'); return; }
  try {
    await fetch(`${SUPABASE_URL}/rest/v1/pq_sessions`, {
      method: 'POST',
      headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}`,
        'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
      body: JSON.stringify({ title, deadline: deadline || null })
    });
    document.getElementById('session-title').value = '';
    document.getElementById('session-deadline').value = '';
    loadSessions();
  } catch(e) { alert('作成エラー: ' + JSON.stringify(e)); }
}

async function loadSessions() {
  try {
    const data = await sb('pq_sessions?select=*&order=created_at.desc');
    const container = document.getElementById('session-list');
    if (!data.length) {
      container.innerHTML = '<div class="text-muted text-sm" style="padding:12px">セッションなし</div>';
      return;
    }
    container.innerHTML = data.map(s => {
      const expired = s.deadline && new Date(s.deadline) < new Date();
      return `
      <div class="section" style="margin-bottom:10px;padding:16px">
        <div class="flex justify-between items-center">
          <div>
            <span style="font-weight:700">${s.title}</span>
            ${s.deadline ? `<span class="badge ${expired ? 'badge-red' : 'badge-blue'}" style="margin-left:8px">${expired ? '期限切れ' : '期限: ' + s.deadline}</span>` : ''}
          </div>
          <div class="flex gap-8">
            <button class="btn btn-ghost" onclick="openSessionDetail('${s.id}','${s.title.replace(/'/g,'\\\'')}')" style="font-size:12px">品目・URL管理</button>
            <button class="btn btn-danger" onclick="deleteSession('${s.id}')" style="font-size:12px;padding:6px 10px">削除</button>
          </div>
        </div>
        <div class="text-sm text-muted" style="margin-top:4px">作成: ${s.created_at?.slice(0,10)}</div>
      </div>`;
    }).join('');
  } catch(e) { console.error(e); }
}

async function deleteSession(id) {
  if (!confirm('このセッションを削除しますか？（品目・回答データも削除されます）')) return;
  await fetch(`${SUPABASE_URL}/rest/v1/pq_sessions?id=eq.${id}`, {
    method: 'DELETE',
    headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` }
  });
  loadSessions();
}

async function openSessionDetail(sessionId, sessionTitle) {
  currentSessionId = sessionId;
  document.getElementById('session-detail-title').textContent = sessionTitle;
  document.getElementById('session-detail-modal').classList.add('open');
  await renderSessionDetail(sessionId);
}

async function renderSessionDetail(sessionId) {
  const body = document.getElementById('session-detail-body');
  body.innerHTML = '<div class="text-muted text-sm">読み込み中...</div>';
  try {
    const items = await sb(`pq_items?session_id=eq.${sessionId}&select=*&order=name`);
    const origin = window.location.origin.includes('localhost') ? BASE_URL : window.location.origin;

    let html = `
      <div style="margin-bottom:14px">
        <button class="btn btn-primary" onclick="openItemModal()">＋ 品目を追加</button>
      </div>`;

    if (!items.length) {
      html += '<div class="text-muted text-sm" style="margin-bottom:16px">品目が未登録です</div>';
    } else {
      html += `
        <div class="table-wrap" style="max-height:220px;overflow-y:auto;margin-bottom:16px">
          <table>
            <thead><tr><th>YJコード</th><th>品名</th><th>規格</th><th>包装薬価</th><th></th></tr></thead>
            <tbody>${items.map(it => `
              <tr>
                <td class="text-sm">${it.yj_code}</td>
                <td>${it.name}</td>
                <td class="text-sm text-muted">${it.spec || ''}</td>
                <td class="text-sm" style="text-align:right">${it.pkg_price?.toFixed(2) || '-'}</td>
                <td><button class="btn btn-ghost" onclick="removeItem('${it.id}')" style="font-size:11px;padding:4px 8px">削除</button></td>
              </tr>`).join('')}
            </tbody>
          </table>
        </div>`;
    }

    if (items.length > 0) {
      html += '<div class="section-title">卸ごとのURL</div>';
      html += '<div class="wholesaler-grid">';
      for (const w of WHOLESALERS) {
        const url = `${origin}/quote.html?session=${sessionId}&wholesaler=${encodeURIComponent(w)}`;
        html += `
          <div class="wholesaler-card">
            <div class="wholesaler-name">${w}</div>
            <div class="url-box">
              <span id="url-${w}">${url}</span>
              <span class="url-copy" onclick="copyUrl('url-${w}')">コピー</span>
            </div>
          </div>`;
      }
      html += '</div>';
    }

    body.innerHTML = html;
  } catch(e) { body.innerHTML = `<div class="alert alert-error">エラー: ${JSON.stringify(e)}</div>`; }
}

function copyUrl(elId) {
  const url = document.getElementById(elId).textContent;
  navigator.clipboard.writeText(url).then(() => {
    const el = document.getElementById(elId).nextElementSibling;
    const orig = el.textContent;
    el.textContent = 'コピー済み！';
    setTimeout(() => el.textContent = orig, 1500);
  });
}

function closeSessionModal() {
  document.getElementById('session-detail-modal').classList.remove('open');
  currentSessionId = null;
  loadSessions();
}

async function removeItem(itemId) {
  if (!confirm('この品目を削除しますか？')) return;
  await fetch(`${SUPABASE_URL}/rest/v1/pq_items?id=eq.${itemId}`, {
    method: 'DELETE',
    headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` }
  });
  await renderSessionDetail(currentSessionId);
}

// ---- Item Modal ----
async function openItemModal() {
  document.getElementById('item-modal').classList.add('open');
  document.getElementById('item-search').value = '';
  if (!allMasterItems.length) {
    // 全件取得（ページング）
    allMasterItems = [];
    let from = 0;
    while (true) {
      const chunk = await fetch(`${SUPABASE_URL}/rest/v1/master_medicines?select=gs1_pkg,yj_code,name,spec,maker,pkg_price,pkg_qty,price_factor,jan_code&order=name&limit=1000&offset=${from}`, {
        headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` }
      }).then(r => r.json());
      allMasterItems = allMasterItems.concat(chunk);
      if (chunk.length < 1000) break;
      from += 1000;
    }
  }
  filterItems();
}

function filterItems() {
  const q = document.getElementById('item-search').value.toLowerCase();
  const filtered = allMasterItems.filter(m =>
    m.name.toLowerCase().includes(q) || m.yj_code.includes(q) || m.gs1_pkg.includes(q)
  );
  const body = document.getElementById('item-select-body');
  body.innerHTML = filtered.slice(0, 200).map(m => `
    <tr>
      <td><input type="checkbox" class="item-check" value="${m.gs1_pkg}" onchange="updateSelectedCount()"></td>
      <td class="text-sm">${m.yj_code}</td>
      <td>${m.name}</td>
      <td class="text-sm text-muted">${m.spec || ''}</td>
      <td class="text-sm text-muted">${m.maker || ''}</td>
      <td class="text-sm" style="text-align:right">${m.pkg_price?.toFixed(2) || '-'}</td>
    </tr>`).join('');
  updateSelectedCount();
}

function toggleAll(cb) {
  document.querySelectorAll('.item-check').forEach(c => c.checked = cb.checked);
  updateSelectedCount();
}

function updateSelectedCount() {
  const n = document.querySelectorAll('.item-check:checked').length;
  document.getElementById('item-selected-count').textContent = `${n}件選択中`;
}

function closeItemModal() {
  document.getElementById('item-modal').classList.remove('open');
}

async function addItemsToSession() {
  const checked = [...document.querySelectorAll('.item-check:checked')].map(c => c.value);
  if (!checked.length) { alert('品目を選択してください'); return; }

  // 既存品目取得
  const existing = await sb(`pq_items?session_id=eq.${currentSessionId}&select=gs1_pkg`);
  const existingCodes = new Set(existing.map(e => e.gs1_pkg));
  const toAdd = checked.filter(c => !existingCodes.has(c));

  if (!toAdd.length) { alert('選択した品目はすでに追加済みです'); return; }

  const masterMap = Object.fromEntries(allMasterItems.map(m => [m.gs1_pkg, m]));
  const rows = toAdd.map(gs1 => {
    const m = masterMap[gs1] || {};
    return {
      session_id: currentSessionId,
      gs1_pkg: gs1,
      yj_code: m.yj_code || '',
      name: m.name || '',
      spec: m.spec || '',
      pkg_price: m.pkg_price || 0,
      pkg_qty: m.pkg_qty || 1,
      price_factor: m.price_factor || 1,
      jan_code: m.jan_code || '',
    };
  });

  await fetch(`${SUPABASE_URL}/rest/v1/pq_items`, {
    method: 'POST',
    headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}`,
      'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
    body: JSON.stringify(rows)
  });

  closeItemModal();
  await renderSessionDetail(currentSessionId);
}

// ================================================================
// PAGE C: 比較・採用
// ================================================================
async function loadCompareSessions() {
  const sel = document.getElementById('compare-session-select');
  const cur = sel.value;
  const data = await sb('pq_sessions?select=id,title&order=created_at.desc');
  sel.innerHTML = '<option value="">-- セッションを選択 --</option>' +
    data.map(s => `<option value="${s.id}" ${s.id === cur ? 'selected' : ''}>${s.title}</option>`).join('');
}

async function loadCompare() {
  const sessionId = document.getElementById('compare-session-select').value;
  const area = document.getElementById('compare-area');
  if (!sessionId) { area.innerHTML = ''; return; }
  area.innerHTML = '<div class="text-muted text-sm" style="padding:12px">読み込み中...</div>';

  const [items, quotes] = await Promise.all([
    sb(`pq_items?session_id=eq.${sessionId}&select=*&order=name`),
    sb(`pq_quotes?session_id=eq.${sessionId}&select=*`)
  ]);

  if (!items.length) { area.innerHTML = '<div class="section text-muted text-sm">品目がありません</div>'; return; }

  // quoteをitem×wholesalerでインデックス化
  const qIdx = {};
  for (const q of quotes) { qIdx[`${q.item_id}_${q.wholesaler}`] = q; }

  // 各品目の最安値を計算
  const bestPrice = {};
  for (const it of items) {
    const prices = WHOLESALERS.map(w => qIdx[`${it.id}_${w}`]?.price).filter(p => p > 0);
    if (prices.length) bestPrice[it.id] = Math.min(...prices);
  }

  const answered = WHOLESALERS.filter(w => items.some(it => qIdx[`${it.id}_${w}`]));

  let html = `
    <div class="section">
      <div class="flex justify-between items-center" style="margin-bottom:14px">
        <div class="section-title" style="margin-bottom:0">回答比較</div>
        <button class="btn btn-success" onclick="exportAdopted('${sessionId}')">📥 採用CSV出力</button>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>品名</th><th>規格</th><th>包装薬価</th>
              ${WHOLESALERS.map(w => `<th>${w}</th>`).join('')}
              <th>採用</th>
            </tr>
          </thead>
          <tbody>`;

  for (const it of items) {
    const isAdopted = quotes.some(q => q.item_id === it.id && q.adopted);
    html += `<tr class="${isAdopted ? 'adopted-row' : ''}">
      <td style="white-space:nowrap">${it.name}</td>
      <td class="text-sm text-muted">${it.spec || ''}</td>
      <td class="text-sm" style="text-align:right">${it.pkg_price?.toFixed(2) || '-'}</td>`;

    for (const w of WHOLESALERS) {
      const q = qIdx[`${it.id}_${w}`];
      if (!q) {
        html += '<td class="text-muted text-sm" style="text-align:center">-</td>';
      } else if (q.stock_type === '取扱なし') {
        html += '<td><span class="badge badge-gray">取扱なし</span></td>';
      } else {
        const isBest = q.price === bestPrice[it.id];
        const rate = it.pkg_price > 0 ? (q.price / it.pkg_price * 100) : null;
        const rateColor = rate !== null ? (rate <= 90.9 ? 'var(--green)' : 'var(--red)') : '';
        html += `<td style="text-align:right">
          <div class="${isBest ? 'price-best' : ''}">${q.price?.toLocaleString()}</div>
          ${rate !== null ? `<div style="font-size:11px;color:${rateColor}">${rate.toFixed(1)}%</div>` : ''}
          <div style="font-size:11px;color:var(--text2)">${q.stock_type || ''}</div>
        </td>`;
      }
    }

    // 採用チェック
    const adoptedQ = quotes.find(q => q.item_id === it.id && q.adopted);
    html += `<td>
      <select style="font-size:12px;padding:4px 8px;min-width:80px" onchange="setAdopted('${it.id}', this.value, '${sessionId}')">
        <option value="">-</option>
        ${WHOLESALERS.map(w => {
          const q = qIdx[`${it.id}_${w}`];
          if (!q || q.stock_type === '取扱なし') return '';
          return `<option value="${w}" ${adoptedQ?.wholesaler === w ? 'selected' : ''}>${w}</option>`;
        }).join('')}
      </select>
    </td></tr>`;
  }

  html += '</tbody></table></div></div>';
  area.innerHTML = html;
}

async function setAdopted(itemId, wholesaler, sessionId) {
  // 全quoteのadoptedをリセット
  const allQ = await sb(`pq_quotes?item_id=eq.${itemId}&select=id`);
  for (const q of allQ) {
    await fetch(`${SUPABASE_URL}/rest/v1/pq_quotes?id=eq.${q.id}`, {
      method: 'PATCH',
      headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({ adopted: false })
    });
  }
  if (wholesaler) {
    await fetch(`${SUPABASE_URL}/rest/v1/pq_quotes?item_id=eq.${itemId}&wholesaler=eq.${wholesaler}`, {
      method: 'PATCH',
      headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({ adopted: true })
    });
  }
}

async function exportAdopted(sessionId) {
  const [items, quotes] = await Promise.all([
    sb(`pq_items?session_id=eq.${sessionId}&select=*&order=name`),
    sb(`pq_quotes?session_id=eq.${sessionId}&adopted=eq.true&select=*`)
  ]);
  const qMap = Object.fromEntries(quotes.map(q => [q.item_id, q]));
  const rows = [['YJコード','品名','規格','GS1(包装)','JANコード','包装薬価','採用卸','採用価格','薬価率(%)','在庫区分','備考']];
  for (const it of items) {
    const q = qMap[it.id];
    const price = q?.price || '';
    const rate = price && it.pkg_price ? (price / it.pkg_price * 100).toFixed(1) : '';
    rows.push([it.yj_code, it.name, it.spec || '', it.gs1_pkg ? '="'+it.gs1_pkg+'"' : '', it.jan_code ? '="'+it.jan_code+'"' : '', it.pkg_price || '',
      q?.wholesaler || '', price, rate, q?.stock_type || '', q?.note || '']);
  }
  const csv = rows.map(r => r.map(v => `"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
  const bom = '\uFEFF';
  const blob = new Blob([bom + csv], { type: 'text/csv;charset=utf-8' });
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = `採用価格_${new Date().toISOString().slice(0,10)}.csv`; a.click();
}
