<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>価格見積もり管理 | pharmacy-inventory</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --bg:#0a0e1a; --surface:#111827; --surface2:#1e2a3a;
  --accent:#00e5ff; --accent2:#00ff88; --warn:#ff6b35; --warn2:#ffd700;
  --fix:#c084fc; --in:#00ff88; --out:#ff6b35; --master:#00e5ff;
  --text:#e2e8f0; --text-dim:#64748b; --border:rgba(0,229,255,0.12);
  --nav-w:200px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans JP',sans-serif;min-height:100vh;}

/* ===== LAYOUT ===== */
.layout{display:flex;min-height:100vh;}
.nav{width:var(--nav-w);background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;}
.nav-logo{padding:18px 14px 14px;border-bottom:1px solid var(--border);}
.nav-logo-title{font-size:13px;font-weight:700;color:var(--text);}
.nav-logo-sub{font-size:9px;color:var(--text-dim);font-family:'JetBrains Mono',monospace;margin-top:2px;}
.nav-section{padding:10px 10px 3px;font-size:9px;color:var(--text-dim);font-family:'JetBrains Mono',monospace;letter-spacing:0.12em;text-transform:uppercase;}
.nav-item{display:flex;align-items:center;gap:9px;padding:9px 12px;border-radius:7px;margin:1px 6px;cursor:pointer;transition:all 0.15s;color:var(--text-dim);font-size:12px;position:relative;}
.nav-item:hover{background:rgba(255,255,255,0.05);color:var(--text);}
.nav-item.active{background:rgba(0,229,255,0.08);color:var(--text);}
.nav-item.active::before{content:'';position:absolute;left:0;top:20%;bottom:20%;width:3px;border-radius:0 2px 2px 0;background:var(--accent);}
.nav-footer{margin-top:auto;padding:12px 14px;border-top:1px solid var(--border);}
.nav-back{font-size:10px;color:var(--text-dim);text-decoration:none;display:flex;align-items:center;gap:5px;}
.nav-back:hover{color:var(--accent);}
.main{margin-left:var(--nav-w);flex:1;padding:28px 32px;}

/* ===== PAGE HEADER ===== */
.ph{display:flex;align-items:center;justify-content:space-between;padding-bottom:18px;border-bottom:1px solid var(--border);margin-bottom:24px;}
.ph-left{}
.ph-title{font-size:18px;font-weight:700;}
.ph-sub{font-size:10px;color:var(--text-dim);font-family:'JetBrains Mono',monospace;margin-top:3px;}

/* ===== PANELS / VIEWS ===== */
.view{display:none;}
.view.active{display:block;}

/* ===== CARDS ===== */
.card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:20px;margin-bottom:16px;}
.card-title{font-size:12px;font-weight:700;color:var(--text-dim);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:14px;}

/* ===== FORM ===== */
.form-row{margin-bottom:14px;}
.form-label{font-size:11px;color:var(--text-dim);margin-bottom:5px;display:block;}
.form-input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:9px 12px;color:var(--text);font-size:13px;font-family:'Noto Sans JP',sans-serif;outline:none;transition:border-color 0.15s;}
.form-input:focus{border-color:var(--accent);}
.form-input::placeholder{color:var(--text-dim);}

/* ===== BUTTONS ===== */
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 18px;border-radius:7px;font-size:12px;font-weight:700;cursor:pointer;transition:all 0.15s;border:none;font-family:'Noto Sans JP',sans-serif;}
.btn-primary{background:var(--accent);color:#0a0e1a;}
.btn-primary:hover{background:#00cfeb;transform:translateY(-1px);}
.btn-ghost{background:transparent;color:var(--text-dim);border:1px solid var(--border);}
.btn-ghost:hover{color:var(--text);border-color:rgba(0,229,255,0.3);}
.btn-success{background:var(--accent2);color:#0a0e1a;}
.btn-success:hover{background:#00e87a;}
.btn-warn{background:var(--warn);color:#fff;}
.btn-warn:hover{background:#e55a25;}
.btn-sm{padding:5px 12px;font-size:11px;}
.btn:disabled{opacity:0.4;cursor:not-allowed;transform:none;}

/* ===== SESSION LIST ===== */
.session-grid{display:grid;gap:12px;}
.session-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px 20px;display:grid;grid-template-columns:1fr auto;align-items:center;gap:12px;transition:border-color 0.15s;cursor:pointer;}
.session-card:hover{border-color:rgba(0,229,255,0.3);}
.session-card.active-session{border-color:rgba(0,229,255,0.4);}
.session-name{font-size:14px;font-weight:700;margin-bottom:4px;}
.session-meta{font-size:10px;color:var(--text-dim);font-family:'JetBrains Mono',monospace;}
.session-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:12px;font-size:10px;font-family:'JetBrains Mono',monospace;}
.badge-open{background:rgba(0,229,255,0.12);color:var(--accent);}
.badge-closed{background:rgba(100,116,139,0.2);color:var(--text-dim);}
.session-actions{display:flex;gap:8px;align-items:center;}

/* ===== MEDICINE SELECT ===== */
.medicine-search-bar{display:flex;gap:10px;margin-bottom:14px;}
.medicine-search-bar .form-input{flex:1;}
.med-table-wrap{max-height:400px;overflow-y:auto;border:1px solid var(--border);border-radius:8px;}
.med-table{width:100%;border-collapse:collapse;}
.med-table th{background:var(--surface2);font-size:10px;color:var(--text-dim);font-family:'JetBrains Mono',monospace;padding:8px 12px;text-align:left;position:sticky;top:0;z-index:1;border-bottom:1px solid var(--border);}
.med-table td{padding:8px 12px;font-size:12px;border-bottom:1px solid rgba(0,229,255,0.05);}
.med-table tr:hover td{background:rgba(255,255,255,0.02);}
.med-table tr.selected td{background:rgba(0,229,255,0.06);}
.yj{color:var(--accent);font-family:'JetBrains Mono',monospace;font-size:10px;}
.select-count{font-size:11px;color:var(--accent2);font-family:'JetBrains Mono',monospace;padding:6px 0;}

/* ===== URL SECTION ===== */
.url-grid{display:grid;gap:10px;}
.url-row{display:grid;grid-template-columns:100px 1fr auto;align-items:center;gap:10px;background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:10px 14px;}
.wholesaler-name{font-size:12px;font-weight:700;}
.url-text{font-size:10px;color:var(--text-dim);font-family:'JetBrains Mono',monospace;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.url-status{font-size:10px;font-family:'JetBrains Mono',monospace;}
.url-status.answered{color:var(--accent2);}
.url-status.waiting{color:var(--text-dim);}

/* ===== COMPARE TABLE ===== */
.compare-wrap{overflow-x:auto;}
.compare-table{width:100%;border-collapse:collapse;min-width:800px;}
.compare-table th{background:var(--surface2);font-size:10px;color:var(--text-dim);font-family:'JetBrains Mono',monospace;padding:9px 12px;text-align:center;border-bottom:1px solid var(--border);white-space:nowrap;}
.compare-table th.left{text-align:left;}
.compare-table td{padding:8px 12px;font-size:12px;border-bottom:1px solid rgba(0,229,255,0.05);text-align:center;vertical-align:middle;}
.compare-table td.left{text-align:left;}
.compare-table tr:hover td{background:rgba(255,255,255,0.02);}
.price-cell{font-family:'JetBrains Mono',monospace;font-size:12px;}
.price-best{color:var(--accent2);font-weight:700;}
.price-none{color:var(--text-dim);font-size:10px;}
.adopt-radio{accent-color:var(--accent2);width:16px;height:16px;cursor:pointer;}
.stock-badge{display:inline-block;padding:2px 7px;border-radius:4px;font-size:9px;font-family:'JetBrains Mono',monospace;}
.stock-always{background:rgba(0,255,136,0.12);color:var(--accent2);}
.stock-order{background:rgba(255,215,0,0.12);color:var(--warn2);}
.stock-none{background:rgba(100,116,139,0.15);color:var(--text-dim);}

/* ===== EMPTY / LOADING ===== */
.empty{text-align:center;padding:40px;color:var(--text-dim);font-size:12px;}
.spinner{width:30px;height:30px;border:3px solid rgba(0,229,255,0.15);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-wrap{display:flex;flex-direction:column;align-items:center;gap:10px;padding:30px;}

/* ===== TOAST ===== */
.toast{position:fixed;bottom:24px;right:24px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:12px 18px;font-size:12px;z-index:100;transform:translateY(20px);opacity:0;transition:all 0.25s;pointer-events:none;}
.toast.show{transform:translateY(0);opacity:1;}
.toast.ok{border-color:rgba(0,255,136,0.4);color:var(--accent2);}
.toast.err{border-color:rgba(255,107,53,0.4);color:var(--warn);}

/* ===== TABS ===== */
.tabs{display:flex;gap:4px;margin-bottom:20px;border-bottom:1px solid var(--border);}
.tab{padding:8px 16px;font-size:12px;color:var(--text-dim);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all 0.15s;}
.tab:hover{color:var(--text);}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);}

/* ===== DIVIDER ===== */
.divider{height:1px;background:var(--border);margin:20px 0;}

.flex-between{display:flex;align-items:center;justify-content:space-between;}
.flex-gap{display:flex;align-items:center;gap:10px;}
.mt8{margin-top:8px;}
.mt16{margin-top:16px;}
</style>
</head>
<body>
<div class="layout">

  <!-- NAV -->
  <nav class="nav">
    <div class="nav-logo">
      <div class="nav-logo-title">💊 価格見積もり</div>
      <div class="nav-logo-sub">QUOTE MANAGER</div>
    </div>
    <div class="nav-section">メニュー</div>
    <div class="nav-item active" onclick="showView('sessions')">
      <span>📋</span><span>セッション一覧</span>
    </div>
    <div class="nav-item" onclick="showView('new-session')">
      <span>➕</span><span>新規作成</span>
    </div>
    <div class="nav-footer">
      <a href="index.html" class="nav-back">← k-tracker に戻る</a>
    </div>
  </nav>

  <!-- MAIN -->
  <main class="main">

    <!-- ===== VIEW: セッション一覧 ===== -->
    <div class="view active" id="view-sessions">
      <div class="ph">
        <div class="ph-left">
          <div class="ph-title">見積もりセッション</div>
          <div class="ph-sub">PRICE QUOTE SESSIONS</div>
        </div>
        <button class="btn btn-primary" onclick="showView('new-session')">＋ 新規作成</button>
      </div>

      <div id="session-list">
        <div class="loading-wrap"><div class="spinner"></div></div>
      </div>
    </div>

    <!-- ===== VIEW: 新規セッション ===== -->
    <div class="view" id="view-new-session">
      <div class="ph">
        <div class="ph-left">
          <div class="ph-title">新規セッション作成</div>
          <div class="ph-sub">NEW SESSION</div>
        </div>
        <button class="btn btn-ghost" onclick="showView('sessions')">← 戻る</button>
      </div>

      <!-- Step 1: タイトル -->
      <div class="card" id="step1-card">
        <div class="card-title">Step 1 — セッション情報</div>
        <div class="form-row">
          <label class="form-label">タイトル（例：2026年5月採用追加分）</label>
          <input class="form-input" id="ns-title" placeholder="2026年〇月採用追加分" />
        </div>
        <div class="form-row">
          <label class="form-label">回答期限</label>
          <input class="form-input" id="ns-deadline" type="datetime-local" />
        </div>
        <div class="mt16">
          <button class="btn btn-primary" onclick="goToStep2()">品目選択へ →</button>
        </div>
      </div>

      <!-- Step 2: 品目選択 -->
      <div class="card" id="step2-card" style="display:none;">
        <div class="card-title">Step 2 — 対象品目を選択</div>
        <div class="medicine-search-bar">
          <input class="form-input" id="med-search" placeholder="品名・YJコードで絞り込み…" oninput="filterMeds()" />
          <button class="btn btn-ghost btn-sm" onclick="selectAll()">全選択</button>
          <button class="btn btn-ghost btn-sm" onclick="clearAll()">クリア</button>
        </div>
        <div class="select-count" id="select-count">0 品目選択中</div>
        <div class="med-table-wrap">
          <table class="med-table">
            <thead>
              <tr>
                <th style="width:36px;"></th>
                <th class="left">品名</th>
                <th>YJコード</th>
                <th>規格</th>
                <th>単位</th>
                <th>卸</th>
              </tr>
            </thead>
            <tbody id="med-tbody"></tbody>
          </table>
        </div>
        <div class="mt16 flex-gap">
          <button class="btn btn-ghost" onclick="backToStep1()">← 戻る</button>
          <button class="btn btn-success" id="create-btn" onclick="createSession()" disabled>✓ セッション作成</button>
        </div>
      </div>
    </div>

    <!-- ===== VIEW: セッション詳細 ===== -->
    <div class="view" id="view-session-detail">
      <div class="ph">
        <div class="ph-left">
          <div class="ph-title" id="detail-title">—</div>
          <div class="ph-sub" id="detail-meta">—</div>
        </div>
        <button class="btn btn-ghost" onclick="showView('sessions')">← 一覧に戻る</button>
      </div>

      <div class="tabs">
        <div class="tab active" onclick="switchTab('urls')">🔗 URL発行</div>
        <div class="tab" onclick="switchTab('compare')">📊 比較・採用</div>
      </div>

      <!-- タブ: URL発行 -->
      <div id="tab-urls">
        <div class="card">
          <div class="card-title">卸向けURL — 各社にコピーして送付</div>
          <div class="url-grid" id="url-grid"></div>
        </div>
      </div>

      <!-- タブ: 比較 -->
      <div id="tab-compare" style="display:none;">
        <div class="flex-between" style="margin-bottom:14px;">
          <div style="font-size:12px;color:var(--text-dim);">最安値を <span style="color:var(--accent2);font-weight:700;">緑</span> でハイライト表示</div>
          <div class="flex-gap">
            <button class="btn btn-ghost btn-sm" onclick="loadCompare()">🔄 更新</button>
            <button class="btn btn-success btn-sm" onclick="exportCSV()">⬇ CSV出力</button>
          </div>
        </div>
        <div class="card" style="padding:0;">
          <div class="compare-wrap">
            <table class="compare-table" id="compare-table">
              <thead id="compare-head"></thead>
              <tbody id="compare-body"></tbody>
            </table>
          </div>
        </div>
        <div class="mt16" style="text-align:right;">
          <button class="btn btn-primary" onclick="saveAdoptions()">✓ 採用を確定</button>
        </div>
      </div>
    </div>

  </main>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
const { createClient } = supabase;
const sb = createClient(
  'https://dgajlhwsjytyojzmtydk.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRnYWpsaHdzanl0eW9qem10eWRrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE2NjMxMzAsImV4cCI6MjA4NzIzOTEzMH0.ol6u5P7zAtPM7I7u8hoZvyi6JkV6E03_vrnNJwpcR3A'
);

const WHOLESALERS = ['アトル','スズケン','ダイコー','東邦','琉薬'];

// ===== STATE =====
let allMeds = [];
let filteredMeds = [];
let selectedYjs = new Set();
let currentSession = null;
let adoptions = {}; // yj_code -> wholesaler

// ===== INIT =====
window.addEventListener('DOMContentLoaded', () => {
  loadSessions();
});

// ===== VIEW CONTROL =====
function showView(name) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById('view-' + name).classList.add('active');
  document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
  if (name === 'sessions') document.querySelectorAll('.nav-item')[0].classList.add('active');
  if (name === 'new-session') {
    document.querySelectorAll('.nav-item')[1].classList.add('active');
    resetNewSession();
    loadMeds();
  }
}

function switchTab(name) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('tab-urls').style.display = name === 'urls' ? 'block' : 'none';
  document.getElementById('tab-compare').style.display = name === 'compare' ? 'block' : 'none';
  if (name === 'compare') loadCompare();
}

// ===== SESSIONS =====
async function loadSessions() {
  const el = document.getElementById('session-list');
  el.innerHTML = '<div class="loading-wrap"><div class="spinner"></div></div>';
  const { data, error } = await sb.from('pq_sessions').select('*').order('created_at', { ascending: false });
  if (error || !data.length) {
    el.innerHTML = '<div class="empty">セッションがありません。「新規作成」から始めてください。</div>';
    return;
  }
  el.innerHTML = '<div class="session-grid">' + data.map(s => `
    <div class="session-card" onclick="openSession('${s.id}')">
      <div>
        <div class="session-name">${s.title || '無題'}</div>
        <div class="session-meta">作成: ${fmtDt(s.created_at)}　${s.closed_at ? '期限: ' + fmtDt(s.closed_at) : ''}</div>
      </div>
      <div class="session-actions">
        <span class="session-badge ${s.closed_at && new Date(s.closed_at) < new Date() ? 'badge-closed' : 'badge-open'}">
          ${s.closed_at && new Date(s.closed_at) < new Date() ? '締切済' : 'OPEN'}
        </span>
      </div>
    </div>
  `).join('') + '</div>';
}

async function openSession(id) {
  const { data } = await sb.from('pq_sessions').select('*').eq('id', id).single();
  currentSession = data;
  document.getElementById('detail-title').textContent = data.title || '無題';
  document.getElementById('detail-meta').textContent = '作成: ' + fmtDt(data.created_at) + (data.closed_at ? '　期限: ' + fmtDt(data.closed_at) : '');
  renderUrlGrid(id);
  // タブをURLに戻す
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', i===0));
  document.getElementById('tab-urls').style.display = 'block';
  document.getElementById('tab-compare').style.display = 'none';
  showView('session-detail');
}

function renderUrlGrid(sessionId) {
  const base = window.location.origin + window.location.pathname.replace('quote_m.html','') + 'quote.html';
  document.getElementById('url-grid').innerHTML = WHOLESALERS.map(w => {
    const url = `${base}?session=${sessionId}&wholesaler=${encodeURIComponent(w)}`;
    return `
    <div class="url-row">
      <div class="wholesaler-name">${w}</div>
      <div class="url-text" title="${url}">${url}</div>
      <button class="btn btn-ghost btn-sm" onclick="copyUrl('${url}','${w}')">コピー</button>
    </div>`;
  }).join('');
}

function copyUrl(url, name) {
  navigator.clipboard.writeText(url).then(() => toast(`${name} のURLをコピーしました`, 'ok'));
}

// ===== NEW SESSION =====
function resetNewSession() {
  document.getElementById('ns-title').value = '';
  document.getElementById('ns-deadline').value = '';
  document.getElementById('step1-card').style.display = 'block';
  document.getElementById('step2-card').style.display = 'none';
  selectedYjs.clear();
  updateSelectCount();
}

function goToStep2() {
  const title = document.getElementById('ns-title').value.trim();
  if (!title) { toast('タイトルを入力してください', 'err'); return; }
  document.getElementById('step1-card').style.display = 'none';
  document.getElementById('step2-card').style.display = 'block';
  renderMedTable();
}

function backToStep1() {
  document.getElementById('step1-card').style.display = 'block';
  document.getElementById('step2-card').style.display = 'none';
}

async function loadMeds() {
  if (allMeds.length) return;
  const { data } = await sb.from('medicines').select('yj_code,name,spec,unit,wholesaler').order('name');
  allMeds = data || [];
  filteredMeds = allMeds;
}

function renderMedTable() {
  const tbody = document.getElementById('med-tbody');
  if (!filteredMeds.length) { tbody.innerHTML = '<tr><td colspan="6" class="empty">該当なし</td></tr>'; return; }
  tbody.innerHTML = filteredMeds.map(m => `
    <tr class="${selectedYjs.has(m.yj_code) ? 'selected' : ''}" onclick="toggleMed('${m.yj_code}')">
      <td><input type="checkbox" ${selectedYjs.has(m.yj_code) ? 'checked' : ''} onclick="event.stopPropagation();toggleMed('${m.yj_code}')" style="accent-color:var(--accent);cursor:pointer;"></td>
      <td>${m.name || '—'}</td>
      <td><span class="yj">${m.yj_code || '—'}</span></td>
      <td style="font-size:11px;color:var(--text-dim);">${m.spec || '—'}</td>
      <td style="font-size:11px;color:var(--text-dim);">${m.unit || '—'}</td>
      <td style="font-size:11px;color:var(--text-dim);">${m.wholesaler || '—'}</td>
    </tr>
  `).join('');
}

function filterMeds() {
  const q = document.getElementById('med-search').value.toLowerCase();
  filteredMeds = q ? allMeds.filter(m => (m.name||'').toLowerCase().includes(q) || (m.yj_code||'').includes(q)) : allMeds;
  renderMedTable();
}

function toggleMed(yj) {
  if (selectedYjs.has(yj)) selectedYjs.delete(yj); else selectedYjs.add(yj);
  updateSelectCount();
  renderMedTable();
}

function selectAll() { filteredMeds.forEach(m => selectedYjs.add(m.yj_code)); updateSelectCount(); renderMedTable(); }
function clearAll() { selectedYjs.clear(); updateSelectCount(); renderMedTable(); }

function updateSelectCount() {
  document.getElementById('select-count').textContent = selectedYjs.size + ' 品目選択中';
  document.getElementById('create-btn').disabled = selectedYjs.size === 0;
}

async function createSession() {
  const title = document.getElementById('ns-title').value.trim();
  const deadline = document.getElementById('ns-deadline').value;
  const btn = document.getElementById('create-btn');
  btn.disabled = true; btn.textContent = '作成中…';

  const { data: sess, error: e1 } = await sb.from('pq_sessions').insert({
    title,
    closed_at: deadline ? new Date(deadline).toISOString() : null
  }).select().single();

  if (e1) { toast('セッション作成失敗: ' + e1.message, 'err'); btn.disabled = false; btn.textContent = '✓ セッション作成'; return; }

  const items = [...selectedYjs].map(yj => {
    const m = allMeds.find(x => x.yj_code === yj);
    return { session_id: sess.id, yj_code: yj, medicine_name: m ? m.name : '' };
  });

  const { error: e2 } = await sb.from('pq_items').insert(items);
  if (e2) { toast('品目登録失敗: ' + e2.message, 'err'); return; }

  toast('セッションを作成しました', 'ok');
  loadSessions();
  openSession(sess.id);
}

// ===== COMPARE =====
async function loadCompare() {
  if (!currentSession) return;
  const tableHead = document.getElementById('compare-head');
  const tableBody = document.getElementById('compare-body');
  tableBody.innerHTML = '<tr><td colspan="20"><div class="loading-wrap"><div class="spinner"></div></div></td></tr>';

  const [{ data: items }, { data: quotes }] = await Promise.all([
    sb.from('pq_items').select('yj_code,medicine_name').eq('session_id', currentSession.id),
    sb.from('pq_quotes').select('*').eq('session_id', currentSession.id)
  ]);

  if (!items || !items.length) {
    tableBody.innerHTML = '<tr><td colspan="20" class="empty">品目がありません</td></tr>';
    return;
  }

  // Build quote map: yj -> wholesaler -> quote
  const qmap = {};
  (quotes || []).forEach(q => {
    if (!qmap[q.yj_code]) qmap[q.yj_code] = {};
    qmap[q.yj_code][q.wholesaler] = q;
  });

  // Head
  tableHead.innerHTML = `<tr>
    <th class="left" style="min-width:180px;">品名</th>
    <th class="left">YJ</th>
    ${WHOLESALERS.map(w => `<th>${w}<br><span style="font-size:9px;font-weight:400;color:var(--text-dim);">価格 / 在庫区分</span></th>`).join('')}
    <th>採用</th>
  </tr>`;

  tableBody.innerHTML = items.map(item => {
    const yj = item.yj_code;
    const prices = WHOLESALERS.map(w => qmap[yj]?.[w]?.quoted_price).filter(p => p != null && p > 0);
    const minPrice = prices.length ? Math.min(...prices) : null;

    const cells = WHOLESALERS.map(w => {
      const q = qmap[yj]?.[w];
      if (!q) return `<td><span class="price-none">—</span></td>`;
      const isBest = q.quoted_price != null && q.quoted_price > 0 && q.quoted_price === minPrice;
      const stockClass = q.stock_type === '常備' ? 'stock-always' : q.stock_type === '受発注' ? 'stock-order' : 'stock-none';
      return `<td>
        <div class="price-cell ${isBest ? 'price-best' : ''}">¥${Number(q.quoted_price).toLocaleString()}</div>
        <span class="stock-badge ${stockClass}">${q.stock_type || '—'}</span>
        ${q.notes ? `<div style="font-size:9px;color:var(--text-dim);margin-top:2px;">${q.notes}</div>` : ''}
      </td>`;
    }).join('');

    const radioGroup = WHOLESALERS.map(w => {
      const q = qmap[yj]?.[w];
      if (!q || !q.quoted_price) return '';
      const checked = adoptions[yj] === w ? 'checked' : '';
      return `<label style="display:flex;align-items:center;gap:3px;font-size:10px;cursor:pointer;">
        <input type="radio" class="adopt-radio" name="adopt_${yj}" value="${w}" ${checked} onchange="adoptions['${yj}']='${w}'">
        ${w}
      </label>`;
    }).join('');

    return `<tr>
      <td class="left" style="font-size:12px;">${item.medicine_name || yj}</td>
      <td class="left"><span class="yj">${yj}</span></td>
      ${cells}
      <td><div style="display:flex;flex-direction:column;gap:4px;">${radioGroup || '<span class="price-none">回答なし</span>'}</div></td>
    </tr>`;
  }).join('');
}

async function saveAdoptions() {
  if (!currentSession) return;
  const entries = Object.entries(adoptions);
  if (!entries.length) { toast('採用を選択してください', 'err'); return; }
  toast(`${entries.length} 品目の採用を保存しました（CSV出力で確認）`, 'ok');
}

function exportCSV() {
  if (!currentSession) return;
  const rows = [['YJコード','品名','採用卸','提示価格','在庫区分']];
  // Collect from current compare table
  document.querySelectorAll('#compare-body tr').forEach(tr => {
    const yj = tr.querySelector('.yj')?.textContent;
    const name = tr.cells[0]?.textContent?.trim();
    if (!yj) return;
    const w = adoptions[yj];
    if (!w) return;
    rows.push([yj, name, w, '', '']);
  });
  const csv = rows.map(r => r.map(c => `"${c}"`).join(',')).join('\n');
  const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url;
  a.download = `見積もり_${currentSession.title || 'export'}_${fmtDate(new Date())}.csv`;
  a.click(); URL.revokeObjectURL(url);
}

// ===== UTILS =====
function fmtDt(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  return `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}
function fmtDate(d) {
  return `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`;
}
function toast(msg, type='ok') {
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = 'toast show ' + type;
  setTimeout(() => el.classList.remove('show'), 2800);
}
</script>
