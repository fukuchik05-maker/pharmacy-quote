<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>価格見積もり回答フォーム</title>
<style>
  :root {
    --bg: #f4f6fb;
    --surface: #ffffff;
    --border: #e2e6f0;
    --accent: #2563eb;
    --accent-light: #eff4ff;
    --green: #059669;
    --green-light: #ecfdf5;
    --red: #dc2626;
    --red-light: #fef2f2;
    --warn: #d97706;
    --warn-light: #fffbeb;
    --text: #1e2535;
    --text2: #64748b;
    --text3: #94a3b8;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Hiragino Sans', 'Yu Gothic UI', sans-serif; font-size: 14px; min-height: 100vh; }

  .header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 20px; height: 56px; display: flex; align-items: center; gap: 12px; position: sticky; top: 0; z-index: 10; box-shadow: 0 1px 4px rgba(0,0,0,.06); }
  .header-logo { font-size: 22px; }
  .header-info { flex: 1; }
  .header-title { font-size: 14px; font-weight: 700; }
  .header-sub { font-size: 12px; color: var(--text2); }
  .header-pct { font-size: 13px; font-weight: 700; color: var(--accent); }

  .progress-bar { height: 3px; background: var(--border); }
  .progress-fill { height: 100%; background: var(--accent); transition: width .3s; }

  .container { max-width: 860px; margin: 0 auto; padding: 20px 16px 100px; }

  .alert { padding: 12px 16px; border-radius: 8px; font-size: 13px; margin-bottom: 12px; line-height: 1.5; }
  .alert-warn    { background: var(--warn-light);   border: 1px solid #fcd34d; color: var(--warn); }
  .alert-error   { background: var(--red-light);    border: 1px solid #fca5a5; color: var(--red); }
  .alert-success { background: var(--green-light);  border: 1px solid #6ee7b7; color: var(--green); }
  .alert-info    { background: var(--accent-light); border: 1px solid #bfdbfe; color: var(--accent); }

  .section-label { font-size: 11px; font-weight: 700; color: var(--text2); text-transform: uppercase; letter-spacing: .07em; margin: 20px 0 10px; }

  .card { background: var(--surface); border: 1.5px solid var(--border); border-radius: 10px; margin-bottom: 10px; transition: border-color .15s; }
  .card.has-error { border-color: #fca5a5; }
  .card.is-done   { border-color: #6ee7b7; }

  .card-header { padding: 14px 16px 8px; display: flex; gap: 10px; align-items: flex-start; }
  .card-num { width: 22px; height: 22px; border-radius: 50%; background: var(--accent); color: #fff; font-size: 11px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 2px; }
  .card-info { flex: 1; }
  .card-name { font-weight: 700; font-size: 14px; line-height: 1.4; }
  .card-spec { font-size: 12px; color: var(--text2); margin-top: 2px; }
  .card-meta { display: flex; gap: 16px; margin-top: 6px; flex-wrap: wrap; }
  .meta-item { font-size: 11px; color: var(--text2); }
  .meta-item b { color: var(--text); font-weight: 600; }

  .card-body { padding: 0 16px 14px 48px; display: flex; flex-direction: column; gap: 10px; }

  .stock-row { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
  .row-label { font-size: 11px; color: var(--text2); min-width: 54px; }
  .stock-btn { padding: 6px 14px; border-radius: 6px; border: 1.5px solid var(--border); background: #fff; color: var(--text2); font-size: 12px; font-weight: 500; cursor: pointer; transition: all .15s; white-space: nowrap; }
  .stock-btn:hover { border-color: var(--accent); color: var(--accent); }
  .sel-jobi  { background: var(--accent); border-color: var(--accent) !important; color: #fff !important; }
  .sel-uke   { background: #7c3aed;       border-color: #7c3aed !important;       color: #fff !important; }
  .sel-nashi { background: var(--text2);  border-color: var(--text2) !important;  color: #fff !important; }

  .price-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .price-input { width: 130px; padding: 7px 10px; border: 1.5px solid var(--border); border-radius: 6px; font-size: 15px; font-weight: 600; text-align: right; outline: none; transition: border-color .15s; }
  .price-input:focus { border-color: var(--accent); }
  .price-input:disabled { background: #f8fafc; color: var(--text3); }
  .price-unit { font-size: 12px; color: var(--text2); }
  .rate-badge { padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 700; white-space: nowrap; }
  .rate-good  { background: var(--green-light); color: var(--green); }
  .rate-bad   { background: var(--red-light);   color: var(--red); }
  .rate-empty { background: #f1f5f9; color: var(--text3); }

  .note-input { padding: 7px 10px; border: 1.5px solid var(--border); border-radius: 6px; font-size: 13px; outline: none; transition: border-color .15s; font-family: inherit; width: 100%; max-width: 480px; }
  .note-input:focus { border-color: var(--accent); }

  .field-error { font-size: 11px; color: var(--red); padding: 0 16px 10px 48px; display: none; }
  .field-error.show { display: block; }

  .bottom-bar { position: fixed; bottom: 0; left: 0; right: 0; background: var(--surface); border-top: 1px solid var(--border); padding: 12px 20px; display: flex; gap: 10px; justify-content: flex-end; align-items: center; box-shadow: 0 -2px 8px rgba(0,0,0,.06); z-index: 10; }
  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 10px 20px; border-radius: 7px; border: none; cursor: pointer; font-size: 13px; font-weight: 600; transition: all .15s; white-space: nowrap; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: #1d4ed8; }
  .btn-ghost { background: #fff; color: var(--text); border: 1.5px solid var(--border); }
  .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }
  .btn:disabled { opacity: .4; cursor: not-allowed; }
  .progress-txt { font-size: 13px; color: var(--text2); margin-right: auto; }

  .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(255,255,255,.3); border-top-color: #fff; border-radius: 50%; animation: spin .6s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .done-overlay { display: none; position: fixed; inset: 0; background: rgba(255,255,255,.96); z-index: 100; flex-direction: column; align-items: center; justify-content: center; gap: 14px; }
  .done-overlay.show { display: flex; }
  .done-icon { font-size: 60px; }
  .done-title { font-size: 22px; font-weight: 700; }
  .done-sub { font-size: 13px; color: var(--text2); }
</style>
</head>
<body>

<div class="header">
  <div class="header-logo">📋</div>
  <div class="header-info">
    <div class="header-title" id="h-title">価格見積もり回答フォーム</div>
    <div class="header-sub"  id="h-sub">読み込み中...</div>
  </div>
  <div class="header-pct" id="h-pct"></div>
</div>
<div class="progress-bar"><div class="progress-fill" id="top-bar" style="width:0%"></div></div>

<div class="container" id="container">
  <div class="alert alert-info">⏳ データを読み込んでいます...</div>
</div>

<div class="bottom-bar" id="bottom-bar" style="display:none">
  <span class="progress-txt" id="prog-txt">0 / 0 件入力済み</span>
  <button class="btn btn-ghost" onclick="exportCSV(false)">📄 確認用CSV</button>
  <button class="btn btn-primary" id="submit-btn" onclick="submitQuotes()">送信する</button>
</div>

<div class="done-overlay" id="done-overlay">
  <div class="done-icon">✅</div>
  <div class="done-title">送信完了しました</div>
  <div class="done-sub" id="done-sub"></div>
  <button class="btn btn-ghost" onclick="exportCSV(true)" style="margin-top:8px">📥 控えCSVをダウンロード</button>
</div>

<script>
const SUPABASE_URL = 'https://ipudfidnptdshywvddcf.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlwdWRmaWRucHRkc2h5d3ZkZGNmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc2NjA5ODksImV4cCI6MjA5MzIzNjk4OX0.yzN4u9KAWff06x6MQwf16s88Rk7vfmEyP69GQ1HIqbQ';

const params     = new URLSearchParams(location.search);
const SESSION_ID = params.get('session');
const WHOLESALER = params.get('wholesaler');

let items = [];

const api = (path, opts = {}) => fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
  headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}`,
    'Content-Type': 'application/json', ...(opts.prefer ? { Prefer: opts.prefer } : {}) },
  method: opts.method || 'GET',
  body: opts.body ? JSON.stringify(opts.body) : undefined
}).then(r => r.ok ? r.json() : r.json().then(e => { throw e; }));

async function init() {
  const c = document.getElementById('container');
  if (!SESSION_ID || !WHOLESALER) {
    c.innerHTML = '<div class="alert alert-error">⚠ URLが正しくありません。</div>'; return;
  }
  try {
    const [sessions, fetched, existing] = await Promise.all([
      api(`pq_sessions?id=eq.${SESSION_ID}&select=*`),
      api(`pq_items?session_id=eq.${SESSION_ID}&select=*&order=name`),
      api(`pq_quotes?session_id=eq.${SESSION_ID}&wholesaler=eq.${encodeURIComponent(WHOLESALER)}&select=*`)
    ]);

    if (!sessions.length) { c.innerHTML = '<div class="alert alert-error">⚠ セッションが見つかりません。</div>'; return; }
    if (!fetched.length)  { c.innerHTML = '<div class="alert alert-error">⚠ 品目が登録されていません。</div>'; return; }

    const session = sessions[0];
    items = fetched;
    const existMap = Object.fromEntries(existing.map(q => [q.item_id, q]));

    document.getElementById('h-title').textContent = session.title;
    document.getElementById('h-sub').textContent   = `${WHOLESALER} 様　回答フォーム`;

    let html = '';

    // 期限チェック
    if (session.deadline) {
      const dl = new Date(session.deadline); dl.setHours(23, 59, 59);
      if (new Date() > dl) {
        html += `<div class="alert alert-warn">⚠ 回答期限（${session.deadline}）を過ぎています。担当者にご確認ください。</div>`;
      } else {
        html += `<div class="alert alert-info">📅 回答期限：${session.deadline}</div>`;
      }
    }
    if (existing.length) {
      html += '<div class="alert alert-success">✏ 前回の回答が読み込まれています。修正して再送信できます。</div>';
    }

    html += `<div class="section-label">回答品目（${items.length}件）</div>`;
    html += items.map((it, i) => buildCard(it, i, existMap[it.id])).join('');
    c.innerHTML = html;

    document.getElementById('bottom-bar').style.display = 'flex';
    updateProgress();
  } catch(e) {
    c.innerHTML = `<div class="alert alert-error">⚠ 読み込みエラー：${JSON.stringify(e)}</div>`;
  }
}

function buildCard(item, idx, ex) {
  const st    = ex?.stock_type || '';
  const price = ex?.price ?? '';
  const note  = ex?.note  || '';
  const nashi = st === '取扱なし';

  const btns = ['常備','受発注','取扱なし'].map(s => {
    const cls = s === st ? (s==='常備'?'sel-jobi':s==='受発注'?'sel-uke':'sel-nashi') : '';
    return `<button type="button" class="stock-btn ${cls}" onclick="selStock('${item.id}','${s}',this)">${s}</button>`;
  }).join('');

  const rateHtml = (price !== '' && item.pkg_price)
    ? rateBadge(parseFloat(price), item.pkg_price)
    : '<span class="rate-badge rate-empty">--.--%</span>';

  return `
<div class="card" id="card-${item.id}">
  <div class="card-header">
    <div class="card-num">${idx+1}</div>
    <div class="card-info">
      <div class="card-name">${item.name}</div>
      ${item.spec ? `<div class="card-spec">${item.spec}</div>` : ''}
      <div class="card-meta">
        <div class="meta-item">包装薬価：<b>¥${item.pkg_price?.toLocaleString() ?? '-'}</b></div>
        <div class="meta-item">包装数：<b>${item.pkg_qty ?? '-'}</b></div>
        ${item.gs1_pkg ? `<div class="meta-item">GS1：<b>${item.gs1_pkg}</b></div>` : ''}
      </div>
    </div>
  </div>
  <div class="card-body">
    <div class="stock-row">
      <span class="row-label">在庫区分</span>
      ${btns}
    </div>
    <div class="price-row" id="pg-${item.id}" style="${nashi?'opacity:.4;pointer-events:none':''}">
      <span class="row-label">提示価格</span>
      <input type="number" class="price-input" id="price-${item.id}"
        value="${price}" min="0" step="0.01" placeholder="0.00"
        oninput="onPrice('${item.id}',${item.pkg_price||0})"
        ${nashi?'disabled':''}>
      <span class="price-unit">円</span>
      <span id="rate-${item.id}">${rateHtml}</span>
    </div>
    <div class="stock-row">
      <span class="row-label">備考</span>
      <input type="text" class="note-input" id="note-${item.id}" value="${note.replace(/"/g,'&quot;')}" placeholder="任意">
    </div>
  </div>
  <div class="field-error" id="err-${item.id}"></div>
</div>`;
}

function rateBadge(price, pkg) {
  if (!pkg) return '<span class="rate-badge rate-empty">--.--%</span>';
  const r = price / pkg * 100;
  return `<span class="rate-badge ${r <= 90.9 ? 'rate-good' : 'rate-bad'}">${r.toFixed(1)}%</span>`;
}

function selStock(id, type, btn) {
  document.getElementById('card-'+id).querySelectorAll('.stock-btn').forEach(b => {
    b.className = 'stock-btn';
  });
  btn.classList.add(type==='常備'?'sel-jobi':type==='受発注'?'sel-uke':'sel-nashi');

  const pg = document.getElementById('pg-'+id);
  const pi = document.getElementById('price-'+id);
  if (type === '取扱なし') {
    pg.style.opacity = '.4'; pg.style.pointerEvents = 'none';
    pi.disabled = true; pi.value = '';
    document.getElementById('rate-'+id).innerHTML = '<span class="rate-badge rate-empty">取扱なし</span>';
  } else {
    pg.style.opacity = '1'; pg.style.pointerEvents = 'auto';
    pi.disabled = false;
  }
  clearErr(id);
  updateProgress();
}

function onPrice(id, pkg) {
  const v = parseFloat(document.getElementById('price-'+id).value);
  document.getElementById('rate-'+id).innerHTML = isNaN(v) ? '<span class="rate-badge rate-empty">--.--%</span>' : rateBadge(v, pkg);
  clearErr(id);
  updateProgress();
}

function getStock(id) {
  const c = document.getElementById('card-'+id);
  const s = c.querySelector('.sel-jobi,.sel-uke,.sel-nashi');
  return s ? s.textContent.trim() : '';
}

function clearErr(id) {
  const e = document.getElementById('err-'+id); e.textContent = ''; e.classList.remove('show');
  document.getElementById('card-'+id).classList.remove('has-error');
}

function showErr(id, msg) {
  const e = document.getElementById('err-'+id); e.textContent = msg; e.classList.add('show');
  document.getElementById('card-'+id).classList.add('has-error');
  document.getElementById('card-'+id).classList.remove('is-done');
}

function updateProgress() {
  let done = 0;
  for (const it of items) {
    const st = getStock(it.id);
    if (!st) continue;
    if (st === '取扱なし') { done++; continue; }
    const v = document.getElementById('price-'+it.id)?.value;
    if (v !== '' && !isNaN(parseFloat(v))) done++;
  }
  const pct = items.length ? Math.round(done/items.length*100) : 0;
  document.getElementById('top-bar').style.width   = pct + '%';
  document.getElementById('prog-txt').textContent  = `${done} / ${items.length} 件入力済み`;
  document.getElementById('h-pct').textContent     = pct + '%';
}

function validate() {
  let ok = true;
  for (const it of items) {
    const st = getStock(it.id);
    if (!st) { showErr(it.id, '在庫区分を選択してください'); ok = false; continue; }
    if (st === '取扱なし') continue;
    const v = document.getElementById('price-'+it.id).value;
    if (v === '' || isNaN(parseFloat(v))) { showErr(it.id, '価格を入力してください'); ok = false; }
  }
  return ok;
}

async function submitQuotes() {
  if (!validate()) {
    const first = document.querySelector('.card.has-error');
    if (first) first.scrollIntoView({ behavior: 'smooth', block: 'center' });
    return;
  }
  const btn = document.getElementById('submit-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> 送信中...';

  try {
    await fetch(`${SUPABASE_URL}/rest/v1/pq_quotes?session_id=eq.${SESSION_ID}&wholesaler=eq.${encodeURIComponent(WHOLESALER)}`, {
      method: 'DELETE',
      headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` }
    });

    const rows = items.map(it => ({
      session_id:  SESSION_ID,
      item_id:     it.id,
      wholesaler:  WHOLESALER,
      price:       getStock(it.id) === '取扱なし' ? null : (parseFloat(document.getElementById('price-'+it.id).value) || null),
      stock_type:  getStock(it.id),
      note:        document.getElementById('note-'+it.id).value.trim() || null
    }));

    await fetch(`${SUPABASE_URL}/rest/v1/pq_quotes`, {
      method: 'POST',
      headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}`,
        'Content-Type': 'application/json', Prefer: 'return=minimal' },
      body: JSON.stringify(rows)
    });

    document.getElementById('done-sub').textContent =
      `${WHOLESALER} 様の回答を受け付けました（${new Date().toLocaleString('ja-JP')}）`;
    document.getElementById('done-overlay').classList.add('show');
  } catch(e) {
    btn.disabled = false;
    btn.innerHTML = '送信する';
    alert('送信エラー: ' + JSON.stringify(e));
  }
}

function exportCSV(isAfter) {
  const rows = [['品名','規格','GS1(包装)','包装薬価','包装数','在庫区分','提示価格','薬価率(%)','備考']];
  for (const it of items) {
    const st    = getStock(it.id) || '';
    const price = st === '取扱なし' ? '' : (document.getElementById('price-'+it.id)?.value || '');
    const rate  = price !== '' && it.pkg_price ? (parseFloat(price)/it.pkg_price*100).toFixed(1) : '';
    const note  = document.getElementById('note-'+it.id)?.value || '';
    rows.push([it.name, it.spec||'', it.gs1_pkg||'', it.pkg_price||'', it.pkg_qty||'', st, price, rate, note]);
  }
  const csv  = rows.map(r => r.map(v => `"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob(['\uFEFF'+csv], { type: 'text/csv;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `${WHOLESALER}_見積回答${isAfter?'_控え':'_確認用'}_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
}

init();
</script>
</body>
</html>
