<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>価格回答フォーム</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --bg:#0a0e1a; --surface:#111827; --surface2:#1e2a3a;
  --accent:#00e5ff; --accent2:#00ff88; --warn:#ff6b35; --warn2:#ffd700;
  --text:#e2e8f0; --text-dim:#64748b; --border:rgba(0,229,255,0.12);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans JP',sans-serif;min-height:100vh;padding:24px 16px 60px;}
.container{max-width:960px;margin:0 auto;}
.header{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px 24px;margin-bottom:24px;}
.header-top{display:flex;align-items:center;gap:12px;margin-bottom:8px;}
.logo{font-size:20px;}
.header-title{font-size:16px;font-weight:700;}
.header-sub{font-size:11px;color:var(--text-dim);font-family:'JetBrains Mono',monospace;}
.header-info{display:flex;gap:20px;margin-top:12px;padding-top:12px;border-top:1px solid var(--border);flex-wrap:wrap;}
.info-item{font-size:12px;}
.info-label{color:var(--text-dim);margin-right:6px;}
.info-val{color:var(--accent);font-weight:700;}
.wholesaler-badge{display:inline-block;background:rgba(0,229,255,0.12);color:var(--accent);border:1px solid rgba(0,229,255,0.3);border-radius:20px;padding:4px 14px;font-size:13px;font-weight:700;}
.notice{background:rgba(255,215,0,0.06);border:1px solid rgba(255,215,0,0.2);border-radius:8px;padding:12px 16px;margin-bottom:20px;font-size:12px;color:var(--warn2);line-height:1.7;}
.table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:24px;}
.table-header{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.table-title{font-size:12px;font-weight:700;color:var(--text-dim);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:0.08em;}
.item-count{font-size:11px;color:var(--text-dim);font-family:'JetBrains Mono',monospace;}
table{width:100%;border-collapse:collapse;}
thead th{background:var(--surface2);font-size:10px;color:var(--text-dim);font-family:'JetBrains Mono',monospace;padding:10px 12px;text-align:left;border-bottom:1px solid var(--border);white-space:nowrap;}
thead th.center{text-align:center;}
tbody tr{border-bottom:1px solid rgba(0,229,255,0.05);}
tbody tr:last-child{border-bottom:none;}
tbody tr:hover td{background:rgba(255,255,255,0.015);}
tbody td{padding:10px 12px;font-size:12px;vertical-align:middle;}
tbody td.center{text-align:center;}
.med-name{font-size:13px;font-weight:500;margin-bottom:2px;}
.med-yj{font-size:10px;color:var(--accent);font-family:'JetBrains Mono',monospace;}
.med-yakka{font-size:10px;color:var(--text-dim);margin-top:2px;}
.price-input{width:110px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:7px 10px;color:var(--text);font-size:13px;font-family:'JetBrains Mono',monospace;text-align:right;outline:none;transition:border-color 0.15s;}
.price-input:focus{border-color:var(--accent);}
.price-input::placeholder{color:var(--text-dim);font-size:11px;}
.stock-select{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:7px 10px;color:var(--text);font-size:12px;outline:none;cursor:pointer;transition:border-color 0.15s;min-width:100px;}
.stock-select:focus{border-color:var(--accent);}
.stock-select option{background:var(--surface2);}
.note-input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:7px 10px;color:var(--text);font-size:12px;outline:none;transition:border-color 0.15s;resize:none;font-family:'Noto Sans JP',sans-serif;}
.note-input:focus{border-color:var(--accent);}
.note-input::placeholder{color:var(--text-dim);}
.gtin-wrap{display:inline-flex;align-items:center;gap:6px;}
.gtin-code{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--accent);letter-spacing:0.03em;}
.gtin-copy{background:transparent;border:1px solid var(--border);border-radius:4px;color:var(--text-dim);font-size:10px;padding:2px 7px;cursor:pointer;transition:all 0.15s;font-family:'Noto Sans JP',sans-serif;}
.gtin-copy:hover{border-color:rgba(0,229,255,0.4);color:var(--accent);}
.gtin-none{font-size:10px;color:var(--text-dim);}
.yakka-rate{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--warn2);}
.yakka-rate.good{color:var(--accent2);}
.yakka-rate.empty{color:var(--text-dim);font-size:10px;}
.submit-area{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px 24px;}
.submit-note{font-size:12px;color:var(--text-dim);margin-bottom:16px;line-height:1.7;}
.btn{display:inline-flex;align-items:center;gap:8px;padding:12px 32px;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;transition:all 0.15s;border:none;font-family:'Noto Sans JP',sans-serif;}
.btn-primary{background:var(--accent);color:#0a0e1a;}
.btn-primary:hover{background:#00cfeb;transform:translateY(-1px);}
.btn-primary:disabled{opacity:0.4;cursor:not-allowed;transform:none;}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--text-dim);}
.btn-ghost:hover{border-color:rgba(0,229,255,0.3);color:var(--text);}
.btn-full{width:100%;justify-content:center;}
.loading-wrap{display:flex;flex-direction:column;align-items:center;gap:14px;padding:60px 20px;text-align:center;}
.spinner{width:36px;height:36px;border:3px solid rgba(0,229,255,0.15);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-text{font-size:12px;color:var(--text-dim);font-family:'JetBrains Mono',monospace;}
.error-wrap,.success-wrap{text-align:center;padding:60px 20px;}
.error-icon,.success-icon{font-size:40px;margin-bottom:12px;}
.error-title,.success-title{font-size:16px;font-weight:700;margin-bottom:8px;}
.success-title{font-size:20px;color:var(--accent2);}
.error-msg,.success-msg{font-size:12px;color:var(--text-dim);line-height:1.7;}
.toast{position:fixed;bottom:24px;right:24px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:12px 18px;font-size:12px;z-index:100;transform:translateY(20px);opacity:0;transition:all 0.25s;pointer-events:none;max-width:280px;}
.toast.show{transform:translateY(0);opacity:1;}
.toast.ok{border-color:rgba(0,255,136,0.4);color:var(--accent2);}
.toast.err{border-color:rgba(255,107,53,0.4);color:var(--warn);}
.progress-bar{height:3px;background:var(--border);border-radius:2px;margin-bottom:20px;overflow:hidden;}
.progress-fill{height:100%;background:var(--accent);border-radius:2px;transition:width 0.3s;}
@media(max-width:600px){.price-input{width:90px;}.header-info{flex-direction:column;gap:8px;}table{font-size:11px;}.med-name{font-size:12px;}}
</style>
</head>
<body>
<div class="container" id="app">
  <div class="loading-wrap"><div class="spinner"></div><div class="loading-text">読み込み中…</div></div>
</div>
<div class="toast" id="toast"></div>
<script>
const { createClient } = supabase;
const sb = createClient(
  'https://dgajlhwsjytyojzmtydk.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRnYWpsaHdzanl0eW9qem10eWRrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE2NjMxMzAsImV4cCI6MjA4NzIzOTEzMH0.ol6u5P7zAtPM7I7u8hoZvyi6JkV6E03_vrnNJwpcR3A'
);

const STOCK_TYPES = ['常備', '受発注', '取扱なし'];
const params = new URLSearchParams(location.search);
const SESSION_ID = params.get('session');
const WHOLESALER = params.get('wholesaler');

// 入力行配列: { yj_code, medicine_name, gtin, yakka }
let rows = [];

window.addEventListener('DOMContentLoaded', init);

async function init() {
  if (!SESSION_ID || !WHOLESALER) {
    renderError('無効なURL', 'URLが正しくありません。担当者にお問い合わせください。');
    return;
  }

  const { data: sess, error: se } = await sb.from('pq_sessions').select('*').eq('id', SESSION_ID).single();
  if (se || !sess) { renderError('セッションが見つかりません', 'URLが無効か削除されています。'); return; }

  if (sess.closed_at && new Date(sess.closed_at) < new Date()) {
    renderError('回答期限が過ぎています', `期限: ${fmtDt(sess.closed_at)}\n担当者にご連絡ください。`);
    return;
  }

  const { data: existing } = await sb.from('pq_quotes')
    .select('id').eq('session_id', SESSION_ID).eq('wholesaler', WHOLESALER).limit(1);
  if (existing && existing.length > 0) {
    renderSuccess('回答済み', `${WHOLESALER} 様はすでに回答済みです。\n修正が必要な場合は担当者にご連絡ください。`);
    return;
  }

  const { data: pqItems, error: ie } = await sb
    .from('pq_items').select('yj_code,medicine_name').eq('session_id', SESSION_ID);
  if (ie || !pqItems || !pqItems.length) {
    renderError('品目が見つかりません', 'このセッションに品目が登録されていません。');
    return;
  }

  const yjCodes = pqItems.map(i => i.yj_code);
  const [{ data: gs1Data }, { data: medData }] = await Promise.all([
    sb.from('gs1_map').select('gtin,yj_code,pkg_type').in('yj_code', yjCodes).eq('pkg_type', '包装'),
    sb.from('medicines').select('yj_code,price,pkg_qty').in('yj_code', yjCodes)
  ]);

  const yakkaMap = {};
  const pkgQtyMap = {};
  (medData || []).forEach(m => {
    yakkaMap[m.yj_code] = parseFloat(m.price) || 0;
    pkgQtyMap[m.yj_code] = parseInt(m.pkg_qty) || 1;
  });

  const gs1ByYj = {};
  (gs1Data || []).forEach(g => {
    if (!gs1ByYj[g.yj_code]) gs1ByYj[g.yj_code] = [];
    gs1ByYj[g.yj_code].push(g.gtin);
  });

  // 行展開：GTINなし→1行、GTINあり→GTIN数分の行
  rows = [];
  pqItems.forEach(item => {
    const gtins = gs1ByYj[item.yj_code] || [];
    const yakka = yakkaMap[item.yj_code] || 0;
    const pkgQty = pkgQtyMap[item.yj_code] || 1;
    if (gtins.length === 0) {
      rows.push({ yj_code: item.yj_code, medicine_name: item.medicine_name, gtin: null, yakka, pkgQty });
    } else {
      gtins.forEach(gtin => {
        rows.push({ yj_code: item.yj_code, medicine_name: item.medicine_name, gtin, yakka, pkgQty });
      });
    }
  });

  const uniqCount = new Set(rows.map(r => r.yj_code)).size;
  const deadline = sess.closed_at
    ? `<div class="info-item"><span class="info-label">回答期限</span><span class="info-val">${fmtDt(sess.closed_at)}</span></div>` : '';

  document.getElementById('app').innerHTML = `
    <div class="header">
      <div class="header-top">
        <div class="logo">💊</div>
        <div>
          <div class="header-title">${sess.title || '価格見積もり依頼'}</div>
          <div class="header-sub">PRICE QUOTE REQUEST</div>
        </div>
      </div>
      <div class="header-info">
        <div class="info-item"><span class="info-label">回答卸</span><span class="wholesaler-badge">${WHOLESALER}</span></div>
        <div class="info-item"><span class="info-label">品目数</span><span class="info-val">${uniqCount} 品目 / ${rows.length} 行</span></div>
        ${deadline}
      </div>
    </div>
    <div class="notice">
      ⚠️ 全行の「提示価格」と「在庫区分」を入力後、画面下部の「回答を送信」を押してください。<br>
      取扱いのない品目は価格欄を空白のまま「取扱なし」を選択してください。<br>
      同一品目でGTINが複数ある場合は、それぞれに価格を入力してください。
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progress" style="width:0%"></div></div>
    <div class="table-wrap">
      <div class="table-header">
        <div class="table-title">見積もり依頼品目</div>
        <div class="item-count" id="answered-count">0 / ${rows.length} 入力済み</div>
      </div>
      <table>
        <thead>
          <tr>
            <th style="min-width:180px;">品名</th>
            <th class="center" style="min-width:170px;">GTIN（包装）</th>
            <th class="center">提示価格（円）</th>
            <th class="center">薬価率</th>
            <th class="center">在庫区分</th>
            <th style="min-width:150px;">備考・条件</th>
          </tr>
        </thead>
        <tbody id="rows-tbody"></tbody>
      </table>
    </div>
    <div class="submit-area">
      <div class="submit-note">全行の入力が完了したら送信してください。送信前にCSVで内容を確認できます。</div>
      <div style="margin-bottom:12px;">
        <button class="btn btn-ghost btn-full" onclick="exportCSV('before')">📄 入力内容をCSV出力（確認用）</button>
      </div>
      <button class="btn btn-primary btn-full" id="submit-btn" onclick="submitQuote()">✓ 回答を送信する</button>
    </div>
  `;

  buildTableRows();
}

function buildTableRows() {
  const tbody = document.getElementById('rows-tbody');
  if (!tbody) return;
  let html = '';
  let i = 0;
  while (i < rows.length) {
    const yj = rows[i].yj_code;
    let span = 0;
    while (i + span < rows.length && rows[i + span].yj_code === yj) span++;

    for (let s = 0; s < span; s++) {
      const row = rows[i + s];
      const idx = i + s;
      const gtinHtml = row.gtin
        ? `<div class="gtin-wrap"><span class="gtin-code">${row.gtin}</span><span style="font-size:10px;color:var(--text-dim);">×${row.pkgQty}</span><button class="gtin-copy" onclick="copyGtin('${row.gtin}')">コピー</button></div>`
        : '<span class="gtin-none">—</span>';
      const inputCells = `
        <td class="center">${gtinHtml}</td>
        <td class="center"><input type="number" class="price-input" id="price-${idx}" placeholder="例: 38500" min="0" step="1" oninput="updateProgress();calcRate(${idx},${row.yakka},${row.pkgQty})"></td>
        <td class="center" id="rate-${idx}"><span class="yakka-rate empty">—</span></td>
        <td class="center"><select class="stock-select" id="stock-${idx}" onchange="updateProgress()"><option value="">選択…</option>${STOCK_TYPES.map(t=>`<option value="${t}">${t}</option>`).join('')}</select></td>
        <td><textarea class="note-input" id="note-${idx}" rows="1" placeholder="条件など"></textarea></td>`;

      if (s === 0) {
        html += `<tr>
          <td rowspan="${span}">
            <div class="med-name">${row.medicine_name || '—'}</div>
            <div class="med-yj">${yj}</div>
            ${row.yakka ? `<div class="med-yakka">薬価 ¥${row.yakka.toLocaleString()} × ${row.pkgQty}包装</div>` : ''}
          </td>${inputCells}</tr>`;
      } else {
        html += `<tr>${inputCells}</tr>`;
      }
    }
    i += span;
  }
  tbody.innerHTML = html;
}

function calcRate(idx, yakka, pkgQty) {
  const price = parseFloat(document.getElementById('price-' + idx)?.value) || 0;
  const cell = document.getElementById('rate-' + idx);
  if (!cell) return;
  const base = yakka * (pkgQty || 1);
  if (!price || !base) { cell.innerHTML = '<span class="yakka-rate empty">—</span>'; return; }
  const rate = (price / base * 100).toFixed(1);
  cell.innerHTML = `<span class="yakka-rate ${parseFloat(rate) <= 100 ? 'good' : ''}">${rate}%</span>`;
}

function copyGtin(gtin) {
  navigator.clipboard.writeText(gtin).then(() => toast('GTINをコピーしました', 'ok'));
}

function updateProgress() {
  let answered = 0;
  rows.forEach((_, idx) => {
    const stock = document.getElementById('stock-' + idx)?.value;
    const price = document.getElementById('price-' + idx)?.value;
    if (stock && (price || stock === '取扱なし')) answered++;
  });
  const pct = rows.length ? Math.round(answered / rows.length * 100) : 0;
  const prog = document.getElementById('progress');
  const cnt = document.getElementById('answered-count');
  if (prog) prog.style.width = pct + '%';
  if (cnt) cnt.textContent = `${answered} / ${rows.length} 入力済み`;
}

function exportCSV(timing) {
  const csvRows = [['品名', 'YJコード', 'GTIN（包装）', '薬価', '提示価格（円）', '薬価率(%)', '在庫区分', '備考']];
  rows.forEach((row, idx) => {
    const price = document.getElementById('price-' + idx)?.value || '';
    const stock = document.getElementById('stock-' + idx)?.value || '';
    const note = document.getElementById('note-' + idx)?.value || '';
    const rate = (price && row.yakka) ? (parseFloat(price) / (row.yakka * (row.pkgQty || 1)) * 100).toFixed(1) : '';
    csvRows.push([row.medicine_name || '', row.yj_code, row.gtin || '', row.yakka || '', price, rate, stock, note]);
  });
  const csv = csvRows.map(r => r.map(c => `"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `見積もり_${WHOLESALER}_${timing === 'after' ? '回答控え' : '入力確認'}_${fmtDate(new Date())}.csv`;
  a.click();
  URL.revokeObjectURL(url);
}

async function submitQuote() {
  const missing = [];
  rows.forEach((row, idx) => {
    if (!document.getElementById('stock-' + idx)?.value) missing.push(row.medicine_name || row.yj_code);
  });
  if (missing.length > 0) { toast(`在庫区分が未選択の行があります（${missing.length}行）`, 'err'); return; }

  const btn = document.getElementById('submit-btn');
  btn.disabled = true; btn.textContent = '送信中…';

  const records = rows.map((row, idx) => ({
    session_id: SESSION_ID,
    yj_code: row.yj_code,
    wholesaler: WHOLESALER,
    gtin: row.gtin || null,
    quoted_price: document.getElementById('price-' + idx)?.value ? parseFloat(document.getElementById('price-' + idx).value) : null,
    stock_type: document.getElementById('stock-' + idx)?.value || null,
    notes: document.getElementById('note-' + idx)?.value || null,
  }));

  const { error } = await sb.from('pq_quotes').insert(records);
  if (error) {
    toast('送信に失敗しました: ' + error.message, 'err');
    btn.disabled = false; btn.textContent = '✓ 回答を送信する';
    return;
  }
  renderSuccess('回答を送信しました', `${WHOLESALER} 様の回答を受け付けました。\nご協力ありがとうございました。`, true);
}

function renderError(title, msg) {
  document.getElementById('app').innerHTML = `
    <div class="header"><div class="header-top"><div class="logo">💊</div><div class="header-title">価格回答フォーム</div></div></div>
    <div class="table-wrap"><div class="error-wrap"><div class="error-icon">⚠️</div><div class="error-title">${title}</div><div class="error-msg">${msg.replace(/\n/g,'<br>')}</div></div></div>`;
}

function renderSuccess(title, msg, showCsv = false) {
  const csvBtn = showCsv ? `<div style="margin-top:20px;"><button class="btn btn-ghost" onclick="exportCSV('after')" style="margin:0 auto;">📄 回答内容をCSVで保存（控え）</button></div>` : '';
  document.getElementById('app').innerHTML = `
    <div class="header"><div class="header-top"><div class="logo">💊</div><div class="header-title">価格回答フォーム</div></div></div>
    <div class="table-wrap"><div class="success-wrap"><div class="success-icon">✅</div><div class="success-title">${title}</div><div class="success-msg">${msg.replace(/\n/g,'<br>')}</div>${csvBtn}</div></div>`;
}

function fmtDt(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  return `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

function fmtDate(d) {
  return `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`;
}

function toast(msg, type = 'ok') {
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = 'toast show ' + type;
  setTimeout(() => el.classList.remove('show'), 3000);
}
</script>
</body>
</html>
